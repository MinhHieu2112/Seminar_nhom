version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: user-service-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-studyplan}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: ${DB_NAME:-studyplan}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-studyplan} -d ${DB_NAME:-studyplan}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - user-service-network

  redis:
    image: redis:7-alpine
    container_name: user-service-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - user-service-network

  user-service:
    build:
      context: .
      dockerfile: Dockerfile.user-service
    container_name: user-service-app
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-studyplan}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      DB_NAME: ${DB_NAME:-studyplan}
      DATABASE_URL: postgresql://${DB_USERNAME:-studyplan}:${DB_PASSWORD:-secret}@postgres:5432/${DB_NAME:-studyplan}
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-dev_refresh_secret_change_in_production}
      TCP_PORT: 8001
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - user-service-network
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile.notification-service
    container_name: notification-service-app
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USERNAME:-studyplan}:${DB_PASSWORD:-secret}@postgres:5432/${DB_NAME:-studyplan}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TCP_PORT: 8002
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@studyplan.app}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - user-service-network
    restart: unless-stopped

  calendar-service:
    build:
      context: .
      dockerfile: Dockerfile.calendar-service
    container_name: calendar-service-app
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USERNAME:-studyplan}:${DB_PASSWORD:-secret}@postgres:5432/${DB_NAME:-studyplan}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # FIX: port phải match với tcp-client.service.ts default (8004)
      TCP_PORT: 8004
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - user-service-network
    restart: unless-stopped

  scheduler-service:
    build:
      context: .
      dockerfile: Dockerfile.scheduler-service
    container_name: scheduler-service-app
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USERNAME:-studyplan}:${DB_PASSWORD:-secret}@postgres:5432/${DB_NAME:-studyplan}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TCP_PORT: 8003
      # FIX: port phải match với TCP_PORT của calendar-service (8004)
      CALENDAR_SERVICE_HOST: calendar-service
      CALENDAR_SERVICE_PORT: 8004
      POMODORO_WORK_MIN: 25
      POMODORO_SHORT_BREAK_MIN: 5
      POMODORO_LONG_BREAK_MIN: 15
      POMODORO_LONG_BREAK_AFTER: 4
    depends_on:
      - calendar-service
      - postgres
      - redis
    networks:
      - user-service-network
    restart: unless-stopped

  ai-service:
    build:
      context: .
      dockerfile: Dockerfile.ai-service
    container_name: ai-service-app
    environment:
      NODE_ENV: production
      TCP_PORT: 8005
    networks:
      - user-service-network
    restart: unless-stopped

  analytics-service:
    build:
      context: .
      dockerfile: Dockerfile.analytics-service
    container_name: analytics-service-app
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USERNAME:-studyplan}:${DB_PASSWORD:-secret}@postgres:5432/${DB_NAME:-studyplan}
      ANALYTICS_TCP_PORT: 8006
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - user-service-network
    restart: unless-stopped


  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-gateway-app
    environment:
      NODE_ENV: production
      GATEWAY_PORT: 8000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-dev_refresh_secret_change_in_production}
      # Microservice TCP connections
      USER_SERVICE_HOST: user-service
      USER_SERVICE_PORT: 8001
      SCHEDULER_SERVICE_HOST: scheduler-service
      SCHEDULER_SERVICE_PORT: 8003
      NOTIFICATION_SERVICE_HOST: notification-service
      NOTIFICATION_SERVICE_PORT: 8002
      # FIX: port match với calendar-service TCP_PORT (8004)
      CALENDAR_SERVICE_HOST: calendar-service
      CALENDAR_SERVICE_PORT: 8004
      ANALYTICS_SERVICE_HOST: analytics-service
      ANALYTICS_SERVICE_PORT: 8006
      AI_SERVICE_HOST: ai-service
      AI_SERVICE_PORT: 8005
    ports:
      - "8000:8000"
    depends_on:
      - user-service
      - scheduler-service
      - notification-service
      - calendar-service
      - analytics-service
    networks:
      - user-service-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  user-service-network:
    driver: bridge
